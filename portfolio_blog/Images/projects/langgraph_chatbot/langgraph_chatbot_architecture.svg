<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LangGraph Chatbot Architecture</title>
  <desc id="desc">Architecture diagram showing Streamlit UI, LangGraph backend, tool calling, SQLite persistence, and streaming response flow.</desc>
  <rect width="1200" height="675" fill="#F8FAFC"/>
  <rect x="42" y="42" width="1116" height="591" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <text x="92" y="105" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">LangGraph Chatbot</text>
  <text x="92" y="143" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">Tools, memory, multi-chat threads, and streaming Streamlit UI</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563EB"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="82" y="230" width="230" height="140" rx="14" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2" filter="url(#shadow)"/>
  <text x="112" y="281" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Streamlit UI</text>
  <text x="112" y="318" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17">Chat input</text>
  <text x="112" y="345" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17">Sidebar threads</text>

  <rect x="405" y="220" width="260" height="160" rx="14" fill="#F0FDFA" stroke="#5EEAD4" stroke-width="2" filter="url(#shadow)"/>
  <text x="439" y="274" fill="#134E4A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">LangGraph</text>
  <text x="439" y="312" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17">StateGraph</text>
  <text x="439" y="339" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17">Chat node</text>

  <rect x="782" y="190" width="270" height="210" rx="14" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2" filter="url(#shadow)"/>
  <text x="818" y="244" fill="#7C2D12" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Tools</text>
  <text x="818" y="286" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17">DuckDuckGo search</text>
  <text x="818" y="317" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17">Calculator</text>
  <text x="818" y="348" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17">Stock price lookup</text>

  <rect x="405" y="470" width="260" height="100" rx="14" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="2" filter="url(#shadow)"/>
  <text x="439" y="515" fill="#831843" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">SQLite Memory</text>
  <text x="439" y="548" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17">Checkpoints and titles</text>

  <line x1="313" y1="300" x2="393" y2="300" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="666" y1="295" x2="770" y2="295" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M782 358 C720 445 704 520 677 520" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M533 470 L533 393" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M405 346 C345 422 271 453 197 381" stroke="#2563EB" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="92" y="510" width="220" height="58" rx="29" fill="#DCFCE7" stroke="#86EFAC" stroke-width="2"/>
  <text x="125" y="547" fill="#14532D" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Streaming response</text>

  <text x="725" y="542" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Each chat uses a thread_id, so old conversations can be loaded again.</text>
</svg>
